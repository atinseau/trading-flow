# Local-dev overlay.
#
# The base docker-compose.yml is deliberately Coolify-friendly: it exposes
# nothing to the host and lets Coolify's Traefik route traffic via
# SERVICE_FQDN_* magic vars. That makes services unreachable from your laptop.
#
# This overlay adds back the port publishings you need locally (DB tools,
# temporal CLI, browsing temporal-ui, the web app, worker /health endpoints)
# AND wires up HMR for tf-web.
#
# Usage:
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose-dev.yaml up -d --build
#
# Or via the convenience script:
#   bun run compose:dev
#
# Coolify ignores override files by default — only docker-compose.yml is used
# in the Build Pack. So nothing here leaks into production.

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  temporal:
    ports:
      - "127.0.0.1:7233:7233"

  temporal-ui:
    ports:
      - "127.0.0.1:8080:8080"

  # Worker services that make LLM calls bind-mount the host's Claude Code
  # OAuth credentials so the bundled `claude` binary (used by the
  # claude-agent-sdk provider) can authenticate without an interactive
  # `claude /login` per container. macOS keeps the creds in the Keychain — to
  # populate the file-on-disk read here, run once:
  #   security find-generic-password -s "Claude Code-credentials" -w \
  #     > ~/.claude/.credentials.json
  # Refresh the file when the OAuth token expires (the SDK will say "Not
  # logged in"). Read-only mount: the container can't write back, so refresh
  # rotation lives on the host.
  scheduler-worker:
    ports:
      - "127.0.0.1:8081:8081"
    # Compose REPLACES volume lists, so re-state the base worker_volumes too.
    volumes:
      - ./prompts:/app/prompts:ro
      - artifacts_data:/data/artifacts
      - claude_workspace:/data/claude-workspace
      - ${HOME}/.claude/.credentials.json:/home/bun/.claude/.credentials.json:ro

  analysis-worker:
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - ./prompts:/app/prompts:ro
      - artifacts_data:/data/artifacts
      - claude_workspace:/data/claude-workspace
      - ${HOME}/.claude/.credentials.json:/home/bun/.claude/.credentials.json:ro

  notification-worker:
    ports:
      - "127.0.0.1:8083:8083"

  tf-web:
    environment:
      NODE_ENV: development
    ports:
      - "127.0.0.1:8084:8084"
    volumes:
      # Bind-mount the source tree so hot-reload picks up host file changes.
      # Compose REPLACES volume lists (no deep-merge), so we must re-state the
      # base mounts here too.
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./bunfig.toml:/app/bunfig.toml:ro
      - ./components.json:/app/components.json:ro
      - ./prompts:/app/prompts:ro
      - artifacts_data:/data/artifacts:ro
      # Bind-mount manifests so the container sees `bun add`/`bun remove`
      # changes immediately (writable so `bun install` can update the lockfile).
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      # Named volume for node_modules: keeps the linux-arm64/x64 binaries built
      # inside the container separate from the host's darwin-arm64 ones (avoids
      # @temporalio/core-bridge / playwright native-deps mismatch on macOS).
      - tf_dev_node_modules:/app/node_modules
    # On every start: `bun install` syncs node_modules with the (possibly
    # updated) lockfile — no-op if nothing changed, fast incremental install
    # if a package was added/removed. Then `bun --watch` for full-process
    # restart on any source change — required for new files (`--hot` keeps the
    # module graph in memory, which means newly-created files aren't picked up
    # by the alias resolver). Client-side React HMR still runs via `Bun.serve`
    # `development.hmr: true` in server.ts, so component edits don't full-reload
    # the browser even though the server process restarts.
    command: sh -c "bun install && bun --watch src/client/server.ts"
    healthcheck:
      # Longer start_period — first boot installs deps into the named volume,
      # subsequent boots are fast (~1-2s).
      start_period: 60s

volumes:
  tf_dev_node_modules:
  # Re-bind the named volumes from the base file to host directories so chart
  # screenshots, OHLCV snapshots, and the Claude Code workspace are
  # browseable on the host in dev (./artifacts, ./claude-workspace). Both are
  # gitignored. Containers still see the same /data/* mount points, so no
  # service-level config changes are needed.
  artifacts_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.dev-artifacts
  claude_workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.dev-claude-workspace
