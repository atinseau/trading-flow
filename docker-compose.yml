name: trading-flow

x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tf-postgres
    restart: unless-stopped
    logging: *default_logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: trading_flow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Use a Docker config (inline content) instead of a bind-mount: Coolify runs
    # `docker compose up` from inside its build helper container, but the docker
    # daemon is on the host. A `./relative/path` bind-mount source is resolved
    # against `--project-directory` (a path that exists ONLY inside the helper),
    # so the daemon never finds the file and silently creates a directory at
    # the bind-mount source. Postgres then logs
    # `init-multiple-dbs.sh: Is a directory` and the init never runs.
    configs:
      - source: postgres_init_script
        target: /docker-entrypoint-initdb.d/init-multiple-dbs.sh
        mode: 0755
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27
    container_name: tf-temporal
    restart: unless-stopped
    logging: *default_logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-trading_flow}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: temporal
      POSTGRES_VISIBILITY_DB: temporal_visibility
      BIND_ON_IP: 0.0.0.0
    expose:
      - "7233"
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address=localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: tf-temporal-ui
    restart: unless-stopped
    logging: *default_logging
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      # If you publish temporal-ui via Coolify (UI → Domains), override this
      # with the actual public URL to keep CORS strict.
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_CORS_ORIGINS:-http://localhost:8080}
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ⚠ COOLIFY: in the resource settings, mark `migrate` and `bootstrap-schedules`
  # as "Exclude from health check" — they exit 0 once done and would otherwise
  # flip the stack to unhealthy. The compose-spec `exclude_from_hc: true` flag
  # exists in Coolify but breaks `docker compose config` validation, so we
  # configure it via the UI instead.
  migrate:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-migrate
    logging: *default_logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-trading_flow}:${POSTGRES_PASSWORD}@postgres:5432/trading_flow
    command: bun run src/cli/migrate.ts
    restart: "no"

  bootstrap-schedules:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-bootstrap-schedules
    logging: *default_logging
    depends_on:
      temporal:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: &worker_env
      DATABASE_URL: postgres://${POSTGRES_USER:-trading_flow}:${POSTGRES_PASSWORD}@postgres:5432/trading_flow
      TEMPORAL_ADDRESS: temporal:7233
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE_SCHEDULER: ${TEMPORAL_TASK_QUEUE_SCHEDULER:-scheduler}
      TEMPORAL_TASK_QUEUE_ANALYSIS: ${TEMPORAL_TASK_QUEUE_ANALYSIS:-analysis}
      TEMPORAL_TASK_QUEUE_NOTIFICATIONS: ${TEMPORAL_TASK_QUEUE_NOTIFICATIONS:-notifications}
      ARTIFACTS_BASE_DIR: ${ARTIFACTS_BASE_DIR:-/data/artifacts}
      CLAUDE_WORKSPACE_DIR: ${CLAUDE_WORKSPACE_DIR:-/data/claude-workspace}
      # Long-lived OAuth token for the bundled `claude` binary (used by the
      # claude-agent-sdk provider). Generated locally by
      # `scripts/dev/bootstrap-claude-token.sh` (auto-fired before
      # `bun compose:dev`) and stored in `.env`. Empty in production unless
      # the deployer wants OAuth instead of an API key.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    # Prompts ship baked into the image via `COPY prompts ./prompts` in the
    # worker Dockerfile — no bind-mount in prod (Coolify can't resolve the
    # `./` source against the host fs from inside the build helper, so a
    # bind-mount silently shadows /app/prompts with an empty directory and
    # workers crash with `ENOENT detector.md.hbs`). The dev overlay re-adds
    # the bind for hot prompt editing.
    volumes: &worker_volumes
      - artifacts_data:/data/artifacts
      - claude_workspace:/data/claude-workspace
    command: bun run src/cli/bootstrap-schedules.ts
    restart: "no"

  scheduler-worker:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-scheduler-worker
    restart: unless-stopped
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      bootstrap-schedules:
        condition: service_completed_successfully
    environment:
      <<: *worker_env
      HEALTH_PORT: "8081"
    volumes: *worker_volumes
    command: bun run src/workers/scheduler-worker.ts
    expose:
      - "8081"
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8081/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  analysis-worker:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-analysis-worker
    restart: unless-stopped
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      bootstrap-schedules:
        condition: service_completed_successfully
    environment:
      <<: *worker_env
      HEALTH_PORT: "8082"
    volumes: *worker_volumes
    command: bun run src/workers/analysis-worker.ts
    expose:
      - "8082"
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8082/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  notification-worker:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-notification-worker
    restart: unless-stopped
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      bootstrap-schedules:
        condition: service_completed_successfully
    environment:
      <<: *worker_env
      HEALTH_PORT: "8083"
    volumes: *worker_volumes
    command: bun run src/workers/notification-worker.ts
    expose:
      - "8083"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8083/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  tf-web:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-web
    restart: unless-stopped
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      bootstrap-schedules:
        condition: service_completed_successfully
    environment:
      <<: *worker_env
      WEB_PORT: "8084"
      NODE_ENV: production
      TF_WEB_POLL_INTERVAL_MS: "1500"
      TF_WEB_POLL_BATCH_SIZE: "200"
      ARTIFACTS_BASE_DIR: "/data/artifacts"
    volumes:
      - artifacts_data:/data/artifacts:ro
    command: bun run src/client/server.ts
    expose:
      - "8084"
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8084/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local
  artifacts_data:
    driver: local
  claude_workspace:
    driver: local

configs:
  postgres_init_script:
    # `$$` escapes a literal `$` so docker-compose doesn't substitute the
    # variable at parse time — we want the running shell to expand
    # POSTGRES_USER/POSTGRES_DB inside the container, not compose.
    content: |
      #!/bin/bash
      set -e
      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-EOSQL
        CREATE DATABASE temporal;
        CREATE DATABASE temporal_visibility;
      EOSQL
