name: trading-flow

services:
  postgres:
    image: postgres:16-alpine
    container_name: tf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: trading_flow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27
    container_name: tf-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-trading_flow}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: temporal
      POSTGRES_VISIBILITY_DB: temporal_visibility
      BIND_ON_IP: 0.0.0.0
    ports:
      - "127.0.0.1:7233:7233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address=localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: tf-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "127.0.0.1:8080:8080"

  migrate:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-trading_flow}:${POSTGRES_PASSWORD}@postgres:5432/trading_flow
    command: bun run src/cli/migrate.ts
    restart: "no"

  bootstrap-schedules:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-bootstrap-schedules
    depends_on:
      temporal:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: &worker_env
      DATABASE_URL: postgres://${POSTGRES_USER:-trading_flow}:${POSTGRES_PASSWORD}@postgres:5432/trading_flow
      TEMPORAL_ADDRESS: temporal:7233
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes: &worker_volumes
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - artifacts_data:/data/artifacts
      - claude_workspace:/data/claude-workspace
    command: bun run src/cli/bootstrap-schedules.ts
    restart: "no"

  scheduler-worker:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-scheduler-worker
    restart: unless-stopped
    depends_on:
      bootstrap-schedules:
        condition: service_completed_successfully
    environment:
      <<: *worker_env
      HEALTH_PORT: "8081"
    volumes: *worker_volumes
    command: bun run src/workers/scheduler-worker.ts
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  analysis-worker:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-analysis-worker
    restart: unless-stopped
    depends_on:
      bootstrap-schedules:
        condition: service_completed_successfully
    environment:
      <<: *worker_env
      HEALTH_PORT: "8082"
    volumes: *worker_volumes
    command: bun run src/workers/analysis-worker.ts
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  notification-worker:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    container_name: tf-notification-worker
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      <<: *worker_env
      HEALTH_PORT: "8083"
    volumes: *worker_volumes
    command: bun run src/workers/notification-worker.ts
    ports:
      - "127.0.0.1:8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  artifacts_data:
    driver: local
  claude_workspace:
    driver: local
